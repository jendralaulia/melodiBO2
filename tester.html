<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BO2 Audio API Tester</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white p-8 font-sans">
    <div class="max-w-3xl mx-auto bg-black p-8 rounded-2xl border-2 border-[#D4AF37] shadow-2xl">
        <h1 class="text-3xl font-black text-[#D4AF37] mb-2"><i class="fa-solid fa-stethoscope"></i> Robot Tester Lagu BO2</h1>
        <p class="text-gray-400 mb-6">Sistem akan mengecek 100 lagu ke server Apple Music. Proses ini memakan waktu sekitar 1-2 Menit.</p>
        
        <div class="flex items-center mb-6">
            <button id="start-btn" onclick="startTesting()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl mr-4 shadow-lg transition">
                <i class="fa-solid fa-play mr-2"></i> Mulai Scan 100 Lagu
            </button>
            <div class="text-xl font-bold">
                Progress: <span id="progress-text" class="text-[#D4AF37]">0 / 100</span>
            </div>
        </div>

        <div class="w-full bg-gray-800 h-4 rounded-full mb-6">
            <div id="progress-bar" class="bg-gradient-to-r from-green-400 to-blue-500 h-4 rounded-full transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4 text-center">
            <div class="bg-green-900/30 border border-green-700 p-4 rounded-xl">
                <p class="text-sm text-green-400 font-bold uppercase">Sukses</p>
                <p id="count-success" class="text-3xl font-black text-green-500">0</p>
            </div>
            <div class="bg-red-900/30 border border-red-700 p-4 rounded-xl">
                <p class="text-sm text-red-400 font-bold uppercase">Gagal / Diblokir</p>
                <p id="count-failed" class="text-3xl font-black text-red-500">0</p>
            </div>
        </div>

        <p class="text-sm text-gray-400 mb-2 font-bold uppercase tracking-widest"><i class="fa-solid fa-clipboard-list"></i> Log Error (Copy Paste ke Gemini):</p>
        <textarea id="log-output" class="w-full h-64 bg-gray-950 text-red-400 p-4 rounded-xl border border-gray-700 font-mono text-sm focus:outline-none focus:border-[#D4AF37]" readonly placeholder="Laporan lagu yang error akan muncul di sini..."></textarea>
    </div>

    <script src="songs.js"></script>

    <script>
        async function fetchAudioUrl(artist, title) {
            const query = encodeURIComponent(`${artist} ${title}`);
            try {
                // Fetch API dengan timeout 5 detik
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                const res = await fetch(`https://itunes.apple.com/search?term=${query}&entity=song&limit=1`, { signal: controller.signal });
                clearTimeout(timeoutId);
                const data = await res.json();
                if (data.results && data.results.length > 0 && data.results[0].previewUrl) return true;
            } catch (e) { return false; }
            return false;
        }

        async function startTesting() {
            const btn = document.getElementById('start-btn');
            const logBox = document.getElementById('log-output');
            btn.disabled = true; btn.classList.add('opacity-50', 'cursor-not-allowed');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Sedang Scanning...`;
            logBox.value = "Memulai proses checking ke server Apple...\n=========================================\n";
            
            let success = 0, failed = 0;

            for (let i = 0; i < songBank.length; i++) {
                const song = songBank[i];
                document.getElementById('progress-text').innerText = `${i + 1} / ${songBank.length}`;
                document.getElementById('progress-bar').style.width = `${((i + 1) / songBank.length) * 100}%`;

                const isOk = await fetchAudioUrl(song.artist, song.title);
                
                if (isOk) {
                    success++;
                    document.getElementById('count-success').innerText = success;
                } else {
                    failed++;
                    document.getElementById('count-failed').innerText = failed;
                    logBox.value += `[GAGAL] ${song.artist} - ${song.title} (${song.origin} ${song.era})\n`;
                }

                // Jeda 500ms agar Apple tidak marah karena di-spam request
                await new Promise(r => setTimeout(r, 500));
            }

            btn.innerHTML = `<i class="fa-solid fa-check mr-2"></i> Selesai`;
            logBox.value += `\n=========================================\nSCAN SELESAI. Total Gagal: ${failed} Lagu.`;
        }
    </script>
</body>
</html>
