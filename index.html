<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuis Tebak Nada BO2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #064e3b; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23047857' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .option-btn { transition: all 0.2s; border-color: #e5e7eb; background-color: #ffffff; color: #374151; }
        @media (hover: hover) and (pointer: fine) { .option-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border-color: #60a5fa !important; background-color: #eff6ff !important; } }
        .option-btn:active:not(:disabled) { transform: scale(0.98); }
        .avatar-btn { font-size: 1.8rem; transition: all 0.2s; border: 3px solid transparent; cursor: pointer; color: #047857; }
        .avatar-btn.selected { border-color: #10b981; background-color: #d1fae5; transform: scale(1.1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); color: #064e3b; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; } .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; } .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-15px) rotate(5deg); } }
        .animate-float { animation: float 3s ease-in-out infinite; }
        
        /* Animasi Kaset Berputar */
        .spin-slow { animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-gray-800">

    <div id="app-container" class="glass-panel w-full max-w-md rounded-3xl shadow-2xl overflow-hidden fade-in relative flex flex-col max-h-[90vh]">
        
        <div id="start-screen" class="p-6 text-center overflow-y-auto custom-scrollbar">
            <div class="text-emerald-600 text-6xl mb-4 animate-float"><i class="fa-solid fa-compact-disc"></i></div>
            <h1 class="text-3xl font-extrabold text-gray-900 mb-1">Tebak Nada</h1>
            <h2 class="text-md text-emerald-700 font-bold mb-4 bg-emerald-100 py-1 rounded-full mx-auto max-w-[80%]">Nostalgia BO2</h2>
            
            <div class="bg-gray-50 rounded-2xl p-4 mb-5 border border-gray-200">
                <p class="text-sm font-bold text-gray-700 mb-3">Pilih Karakter & Nama Anda</p>
                <div id="avatar-grid" class="grid grid-cols-5 gap-2 mb-4"></div>
                <input type="text" id="player-name" placeholder="Ketik Nama..." class="w-full px-4 py-3 rounded-xl border-2 border-gray-300 focus:border-emerald-500 focus:outline-none text-center font-bold text-lg transition-all" autocomplete="off" maxlength="15">
                <p id="input-error" class="text-red-500 text-sm mt-2 font-semibold hidden animate-pulse">Pilih karakter & isi nama dulu!</p>
            </div>
            
            <button onclick="prepareGame()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-6 rounded-2xl shadow-lg transition duration-200 transform hover:scale-[1.02] text-lg flex justify-center items-center">
                Mulai Main <i class="fa-solid fa-music ml-2"></i>
            </button>
        </div>

        <div id="game-screen" class="hidden flex-col h-full overflow-y-auto relative">
            
            <div id="audio-loading" class="absolute inset-0 bg-white/90 z-30 flex flex-col items-center justify-center hidden backdrop-blur-sm">
                <i class="fa-solid fa-compact-disc fa-spin text-5xl text-emerald-600 mb-3"></i>
                <p class="font-bold text-emerald-800 animate-pulse">Mencari kaset dari Apple Music...</p>
            </div>

            <div class="bg-emerald-600 text-white p-3 flex justify-between items-center shadow-md rounded-b-xl sticky top-0 z-10">
                <div class="font-bold flex flex-col">
                    <span class="text-[10px] text-emerald-200 uppercase">Skor</span>
                    <span class="text-lg flex items-center"><i class="fa-solid fa-star text-yellow-300 mr-1 text-xs"></i> <span id="score-display">0</span></span>
                </div>
                <div class="font-bold text-center">
                    <span class="text-[10px] text-emerald-200 uppercase block">Lagu</span>
                    <span class="text-lg"><span id="question-number">1</span>/10</span>
                </div>
                <div class="font-bold flex flex-col items-end">
                    <span class="text-[10px] text-emerald-200 uppercase">Waktu</span>
                    <span class="text-lg flex items-center bg-emerald-800 px-2 rounded-lg"><i class="fa-solid fa-stopwatch mr-1 text-xs"></i> <span id="timer-display">20</span></span>
                </div>
            </div>

            <div class="w-full bg-gray-200 h-1.5 mt-1">
                <div id="progress-bar" class="bg-yellow-400 h-1.5 transition-all duration-300 rounded-r-full" style="width: 0%"></div>
            </div>

            <div class="p-5 flex-grow text-center">
                <div class="mx-auto w-24 h-24 bg-gray-800 rounded-full flex items-center justify-center border-4 border-gray-900 mb-4 relative shadow-lg" id="cassette-ui">
                    <div class="w-8 h-8 bg-white rounded-full"></div>
                    <i class="fa-solid fa-music absolute text-emerald-400 text-xl animate-pulse"></i>
                </div>

                <span id="stage-badge" class="inline-block bg-blue-100 text-blue-800 text-xs font-black px-3 py-1 rounded-full mb-3 uppercase tracking-wider">TAHAP 1: SIAPA PENYANYINYA?</span>
                
                <div id="options-container" class="space-y-2 mt-2"></div>
            </div>
            
            <div id="feedback-container" class="hidden absolute inset-0 flex items-center justify-center bg-white bg-opacity-95 z-20">
                <div id="feedback-content" class="text-center transform scale-150 transition-transform duration-300 flex flex-col items-center"></div>
            </div>
        </div>

        <div id="result-screen" class="hidden p-6 text-center overflow-y-auto custom-scrollbar">
            <h2 class="text-2xl font-extrabold text-emerald-700 mb-1">Konser Selesai!</h2>
            <p class="text-gray-600 mb-5 text-md"><span id="final-avatar" class="text-emerald-600"></span> <span id="final-name" class="font-bold text-gray-900">Nama</span></p>
            
            <div class="bg-gradient-to-br from-emerald-50 to-emerald-100 rounded-2xl p-4 mb-6 border border-emerald-200 shadow-inner">
                <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold mb-1">Total Skor Musikmu</p>
                <div class="text-5xl font-black text-emerald-600 mb-3 drop-shadow-sm" id="final-score">0</div>
            </div>

            <button onclick="location.reload()" class="w-full bg-white border-2 border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-3 px-4 rounded-xl transition duration-200">
                <i class="fa-solid fa-rotate-right mr-1"></i> Main Ulang
            </button>
        </div>
    </div>

    <div id="countdown-screen" class="fixed inset-0 bg-emerald-900 flex flex-col items-center justify-center text-white h-full w-full transition-opacity duration-300 opacity-0 pointer-events-none z-[-1]">
        <h1 id="countdown-title" class="text-2xl md:text-3xl text-emerald-200 mb-8 tracking-widest uppercase font-semibold transition-opacity duration-300">Siap-siap...</h1>
        <div id="countdown-circle" class="relative flex items-center justify-center w-64 h-64 mx-auto rounded-full bg-emerald-800 shadow-[0_0_50px_rgba(16,185,129,0.5)] border-4 border-yellow-400/50 transition-opacity duration-300">
            <span id="countdown-number" class="text-8xl md:text-9xl font-bold text-yellow-300 drop-shadow-[0_0_20px_rgba(253,224,71,0.8)] opacity-0">5</span>
        </div>
    </div>

    <script src="songs.js"></script>

    <script>
        const sfxRight = new Audio('sfx-right.mp3');
        const sfxWrong = new Audio('sfx-timeout.mp3'); // Pakai sfx timeout untuk salah
        
        let activeAudio = null; // Menyimpan lagu yang sedang diputar

        const allIcons = ['fa-user', 'fa-headphones', 'fa-guitar', 'fa-microphone', 'fa-compact-disc', 'fa-radio', 'fa-record-vinyl'];
        let selectedAvatarClass = '';
        
        function renderAvatars() {
            const avatarGrid = document.getElementById('avatar-grid'); avatarGrid.innerHTML = '';
            allIcons.forEach(icon => {
                const btn = document.createElement('button');
                btn.className = 'avatar-btn rounded-xl bg-white shadow-sm flex items-center justify-center p-3';
                btn.innerHTML = `<i class="fa-solid ${icon}"></i>`;
                btn.onclick = () => {
                    document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected'); selectedAvatarClass = `<i class="fa-solid ${icon}"></i>`;
                }; avatarGrid.appendChild(btn);
            });
        }
        renderAvatars();

        let sessionSongs = [], currentQuestionIndex = 0, score = 0, playerName = "";
        let timeLeft = 20, timerInterval, isAnswering = false;
        let currentStage = 1; // 1 = Tebak Penyanyi, 2 = Tebak Judul

        function prepareGame() {
            const name = document.getElementById('player-name').value.trim();
            const errorMsg = document.getElementById('input-error');
            if (name === "" || selectedAvatarClass === "") { errorMsg.classList.remove('hidden'); return; }
            errorMsg.classList.add('hidden'); playerName = name;
            
            // Acak 10 lagu dari bank
            let shuffledBank = [...songBank].sort(() => 0.5 - Math.random());
            sessionSongs = shuffledBank.slice(0, 10);
            
            startGame();
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            const countdownScreen = document.getElementById('countdown-screen');
            const countdownNumber = document.getElementById('countdown-number');
            
            countdownScreen.classList.replace('opacity-0', 'opacity-100');
            countdownScreen.classList.replace('z-[-1]', 'z-[100]');

            setTimeout(() => {
                let count = 5;
                function triggerAnim(num) {
                    countdownNumber.innerText = num;
                    countdownNumber.classList.remove('animate-pop', 'opacity-0');
                    void countdownNumber.offsetWidth; 
                    countdownNumber.classList.add('animate-pop');
                }
                triggerAnim(count);

                const countInterval = setInterval(() => {
                    count--;
                    if(count > 0) {
                        triggerAnim(count);
                    } else {
                        clearInterval(countInterval);
                        countdownScreen.classList.replace('opacity-100', 'opacity-0');
                        countdownScreen.classList.replace('z-[100]', 'z-[-1]');
                        document.getElementById('game-screen').classList.remove('hidden');
                        
                        loadQuestion(); // Mulai soal pertama
                    }
                }, 1000);
            }, 100);
        }

        // TUGAS BERAT: Mengambil Audio dari Apple Music
        async function fetchAudioUrl(artist, title) {
            const query = encodeURIComponent(`${artist} ${title}`);
            try {
                // Tembak API gratis Apple iTunes Search
                const res = await fetch(`https://itunes.apple.com/search?term=${query}&entity=song&limit=1`);
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    return data.results[0].previewUrl; // Dapat link MP3 30 detik
                }
            } catch (e) { console.error("Gagal cari lagu", e); }
            return null;
        }

        async function loadQuestion() {
            isAnswering = false; currentStage = 1; // Selalu mulai dari tebak penyanyi
            const song = sessionSongs[currentQuestionIndex];
            
            document.getElementById('question-number').innerText = currentQuestionIndex + 1;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex) / sessionSongs.length) * 100}%`;
            document.getElementById('cassette-ui').classList.remove('spin-slow');

            // 1. Tampilkan layar loading saat mencari lagu
            document.getElementById('audio-loading').classList.remove('hidden');
            
            // 2. Cari audio di Apple Music
            const audioUrl = await fetchAudioUrl(song.artist, song.title);
            
            document.getElementById('audio-loading').classList.add('hidden');

            // Jika lagu tidak ketemu di API Apple, langsung skip (kasih nilai gratis 500 sebagai kompensasi error)
            if(!audioUrl) {
                alert(`Maaf, lagu ${song.title} gagal dimuat dari server. Lanjut lagu berikutnya!`);
                score += 500; animateScore(score);
                nextQuestion();
                return;
            }

            // 3. Putar Lagu
            if(activeAudio) { activeAudio.pause(); }
            activeAudio = new Audio(audioUrl);
            activeAudio.play();
            document.getElementById('cassette-ui').classList.add('spin-slow'); // Kaset mutar

            // 4. Render UI Tahap 1
            renderStageUI();

            // 5. Mulai Timer 20 Detik
            timeLeft = 20; document.getElementById('timer-display').innerText = timeLeft;
            clearInterval(timerInterval); timerInterval = setInterval(updateTimer, 1000);
        }

        function renderStageUI() {
            const song = sessionSongs[currentQuestionIndex];
            const optionsContainer = document.getElementById('options-container'); 
            optionsContainer.innerHTML = '';

            if (currentStage === 1) {
                document.getElementById('stage-badge').innerText = "TAHAP 1: SIAPA PENYANYINYA?";
                document.getElementById('stage-badge').className = "inline-block bg-blue-100 text-blue-800 text-xs font-black px-3 py-1 rounded-full mb-3 uppercase tracking-wider";
                
                // Render opsi penyanyi (acak posisinya)
                let options = [...song.artistOptions].sort(() => Math.random() - 0.5);
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full text-center p-3 rounded-xl border-2 font-bold focus:outline-none";
                    btn.innerText = opt;
                    btn.onclick = () => handleAnswer(opt === song.artist, btn, song.artist); 
                    optionsContainer.appendChild(btn);
                });
            } else {
                document.getElementById('stage-badge').innerText = "TAHAP 2: APA JUDUL LAGUNYA?";
                document.getElementById('stage-badge').className = "inline-block bg-yellow-100 text-yellow-800 text-xs font-black px-3 py-1 rounded-full mb-3 uppercase tracking-wider";
                
                // Render opsi judul (acak posisinya)
                let options = [...song.titleOptions].sort(() => Math.random() - 0.5);
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full text-center p-3 rounded-xl border-2 font-bold focus:outline-none";
                    btn.innerText = opt;
                    btn.onclick = () => handleAnswer(opt === song.title, btn, song.title); 
                    optionsContainer.appendChild(btn);
                });
            }
        }

        function updateTimer() {
            timeLeft--; document.getElementById('timer-display').innerText = timeLeft;
            if (timeLeft <= 0) { 
                clearInterval(timerInterval); 
                if(activeAudio) activeAudio.pause();
                document.getElementById('cassette-ui').classList.remove('spin-slow');
                showFeedback(false, "Waktu Habis!");
                setTimeout(nextQuestion, 1500); 
            }
        }

        function handleAnswer(isCorrect, selectedBtn, correctAnswer) {
            if (isAnswering) return; 
            isAnswering = true;
            
            const buttons = document.getElementById('options-container').querySelectorAll('button');
            buttons.forEach(btn => { 
                btn.disabled = true; 
                if(btn.innerText === correctAnswer) {
                    btn.style.borderColor = '#10b981'; btn.style.backgroundColor = '#d1fae5'; btn.style.color = '#065f46';
                } else {
                    btn.classList.add('opacity-50');
                }
            });

            if (isCorrect) {
                selectedBtn.style.borderColor = '#10b981'; selectedBtn.style.backgroundColor = '#d1fae5';
                sfxRight.currentTime = 0; sfxRight.play();
                
                if (currentStage === 1) {
                    // Lanjut ke Tahap 2 (Tidak stop timer, tidak stop lagu)
                    showFeedback(true, "BENAR! Lanjut Judul!");
                    setTimeout(() => {
                        currentStage = 2;
                        isAnswering = false;
                        renderStageUI(); // Render tombol judul
                    }, 1200);
                } else {
                    // Selesai Tahap 2 dengan benar
                    clearInterval(timerInterval);
                    if(activeAudio) activeAudio.pause();
                    document.getElementById('cassette-ui').classList.remove('spin-slow');
                    
                    const points = 1000 + (timeLeft * 50); // Poin Sempurna + Bonus waktu
                    score += points; animateScore(score);
                    showFeedback(true, `SEMPURNA! +${points}`);
                    setTimeout(nextQuestion, 1500);
                }
            } else {
                // Salah di tahap mana pun = Game over untuk lagu ini
                selectedBtn.style.borderColor = '#ef4444'; selectedBtn.style.backgroundColor = '#fee2e2';
                sfxWrong.currentTime = 0; sfxWrong.play();
                clearInterval(timerInterval);
                if(activeAudio) activeAudio.pause();
                document.getElementById('cassette-ui').classList.remove('spin-slow');

                if (currentStage === 1) {
                    showFeedback(false, "NOL BESAR!"); // Salah penyanyi = 0
                } else {
                    score += 500; animateScore(score); // Setengah poin karena penyanyi benar
                    showFeedback(false, "SAYANG SEKALI! +500");
                }
                setTimeout(nextQuestion, 2000);
            }
        }

        function showFeedback(isCorrect, text) {
            const container = document.getElementById('feedback-container'); const content = document.getElementById('feedback-content');
            container.classList.remove('hidden');
            content.innerHTML = isCorrect 
                ? `<div class="bg-white rounded-full p-3 shadow-xl mb-2"><i class="fa-solid fa-check text-4xl text-green-500"></i></div><span class="font-black text-2xl text-green-600 drop-shadow-md text-center">${text}</span>`
                : `<div class="bg-white rounded-full p-3 shadow-xl mb-2"><i class="fa-solid fa-xmark text-4xl text-red-500"></i></div><span class="font-black text-2xl text-red-600 drop-shadow-md text-center">${text}</span>`;
            content.style.transform = 'scale(1)'; setTimeout(() => { container.classList.add('hidden'); content.style.transform = 'scale(1.5)'; }, 1000);
        }

        function animateScore(targetScore) {
            let display = document.getElementById('score-display'); let start = parseInt(display.innerText.replace(/,/g, ''));
            let duration = 600, startTime = null;
            const step = (timestamp) => {
                if (!startTime) startTime = timestamp; const progress = Math.min((timestamp - startTime) / duration, 1);
                display.innerText = Math.floor((progress * (2 - progress)) * (targetScore - start) + start).toLocaleString('id-ID');
                if (progress < 1) window.requestAnimationFrame(step); else display.innerText = targetScore.toLocaleString('id-ID');
            }; window.requestAnimationFrame(step);
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < sessionSongs.length) {
                loadQuestion(); 
            } else {
                endGame();
            }
        }

        function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('final-avatar').innerHTML = selectedAvatarClass; 
            document.getElementById('final-name').innerText = playerName;
            document.getElementById('final-score').innerText = score.toLocaleString('id-ID');
            document.getElementById('result-screen').classList.remove('hidden'); 
            document.getElementById('result-screen').classList.add('fade-in');
        }
    </script>
</body>
</html>
